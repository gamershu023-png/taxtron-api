<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - Taxtron</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

.container{
  max-width:600px;
  margin:60px auto;
  text-align:center;
}

/* CARD */
.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:30px;
  border-radius:16px;
}

/* AVATAR */
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:15px;
}

/* TEXT */
h2{
  margin:5px 0;
}

p{
  color:#94a3b8;
  font-size:14px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  cursor:pointer;
}

/* LOGOUT */
.logout{
  background:#ef4444;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <img id="avatar" class="avatar" src="https://i.pravatar.cc/100">

    <h2 id="name">Loading...</h2>
    <p id="email"></p>
    <p id="uid"></p>

    <!-- EDIT NAME -->
    <input id="newName" placeholder="Update your name">

    <button onclick="updateName()">Update Name</button>

    <button class="logout" onclick="logout()">Logout</button>

  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

// LOAD USER
firebase.auth().onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login2.html";
    return;
  }

  document.getElementById("name").innerText =
    user.displayName || "No Name";

  document.getElementById("email").innerText =
    user.email;

  document.getElementById("uid").innerText =
    "UID: " + user.uid;

  if(user.photoURL){
    document.getElementById("avatar").src = user.photoURL;
  }

});

// UPDATE NAME
function updateName(){
  const user = firebase.auth().currentUser;
  const name = document.getElementById("newName").value;

  if(!name) return;

  user.updateProfile({
    displayName: name
  }).then(()=>{
    alert("Name updated!");
    location.reload();
  });
}

// LOGOUT
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
