<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Taxtron</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

.container{
  max-width:500px;
  margin:60px auto;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:25px;
  border-radius:16px;
  text-align:center;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

.logout{
  background:#ef4444;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <img id="avatar" class="avatar" src="https://i.pravatar.cc/100">

    <h2 id="name">Loading...</h2>
    <p id="email"></p>
    <p id="uid"></p>

    <input id="newName" placeholder="Enter new name">

    <button onclick="updateName()">Update Name</button>
    <button class="logout" onclick="logout()">Logout</button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// 🔥 SAME CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "YOUR_APP_ID"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

// 🔥 LOAD USER (THIS IS CRITICAL)
auth.onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  const name = user.displayName || user.email.split("@")[0];

  document.getElementById("name").innerText = name;
  document.getElementById("email").innerText = user.email;
  document.getElementById("uid").innerText = "UID: " + user.uid;

  if(user.photoURL){
    document.getElementById("avatar").src = user.photoURL;
  }

});

// 🔥 UPDATE NAME (FIXED)
function updateName(){
  const user = auth.currentUser;
  const newName = document.getElementById("newName").value.trim();

  if(!newName){
    alert("Enter name first");
    return;
  }

  user.updateProfile({
    displayName: newName
  }).then(()=>{
    alert("Updated ✅");
    location.reload();
  }).catch(err=>{
    alert("Error: " + err.message);
  });
}

// 🔥 LOGOUT
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
