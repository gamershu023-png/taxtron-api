<!DOCTYPE html>
<html>
<head>
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Taxtron Profile</title>

<style>

/* 🔥 FULLSCREEN */
html, body {
  margin: 0 !important;
  padding: 0 !important;
  height: 100% !important;
  width: 100% !important;
  overflow: hidden !important;
  background: #020617 !important;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* REMOVE BLOGGER UI */
.post, .post-body, .post-outer, .content, .main {
  margin: 0 !important;
  padding: 0 !important;
  width: 100% !important;
  max-width: 100% !important;
}
header, footer { display: none !important; }

/* CENTER */
.wrapper {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  background: #0f172a;
  padding: 30px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
  border: 1px solid #1e293b;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(30px); }
  to { opacity:1; transform: translateY(0); }
}

/* AVATAR */
.avatar {
  width: 85px;
  height: 85px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid #38bdf8;
}

/* TEXT */
.name {
  font-size: 20px;
  font-weight: 600;
  color: white;
}

.email {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 20px;
}

.message {
  font-size: 14px;
  color: #cbd5f5;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.03);
}

/* BUTTON TYPES */
.home-btn {
  background: transparent;
  color: white;
  border: 1px solid #334155;
}
.home-btn:hover { background: #1e293b; }

.home {
  background: #38bdf8;
  color: black;
}

.logout {
  background: #ef4444;
  color: white;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="card">
    <img class="avatar" id="avatar" src="https://i.pravatar.cc/100">
    <div class="name" id="name">Loading...</div>
    <div class="email" id="email"></div>

    <div class="message" id="message"></div>
    
    <button class="btn home-btn" onclick="goMainHome()">Go to Home</button>
    <button class="btn home" onclick="goHome()">Open AI</button>
    <button class="btn logout" onclick="logout()">Logout</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

// 🔥 SAFE INIT
const firebaseConfig = {
  apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

/* AUTH */
auth.onAuthStateChanged(user => {

  if (!user) {
    window.location.href = "/login.html";  // change if blogger
    return;
  }

  // ✅ SAFE NAME
  const name = user.displayName || user.email.split("@")[0];

  // UI
  document.getElementById("avatar").src =
    user.photoURL || "https://i.pravatar.cc/100";

  document.getElementById("name").innerText = name;
  document.getElementById("email").innerText = user.email || "";

  // ✅ SAFE MESSAGE
  const firstName = name.split(" ")[0];

  document.getElementById("message").innerText =
    `Welcome back, ${firstName} 👋
Ready to continue your journey with Taxtron AI 🚀`;

});

/* ACTIONS */
function logout() {
  auth.signOut().then(()=>{
    window.location.href = "/";
  });
}

function goHome() {
  window.location.href = "/ai";
}

function goMainHome() {
  window.location.href = "/";
}

</script>

</body>
</html>
