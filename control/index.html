<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Taxtron Ecosystem</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19; --card-bg: #111827; --text-main: #f3f4f6;
            --text-muted: #9ca3af; --accent: #6366f1; --accent-hover: #4f46e5;
            --danger: #ef4444; --border-radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #1f2937; margin-bottom: 30px; }
        header img { max-width: 150px; margin-bottom: 15px; }
        
        .card { background-color: var(--card-bg); border-radius: var(--border-radius); padding: 25px; border: 1px solid #1f2937; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-control { width: 100%; padding: 12px; background: #0b0f19; border: 1px solid #374151; border-radius: 6px; color: white; font-size: 1rem; transition: 0.2s; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        
        .submit-btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: var(--accent-hover); }
        
        .update-item { background: #0b0f19; padding: 15px; border-radius: 8px; border: 1px solid #1f2937; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .delete-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://taxtron.in/logo1526tx.gif" alt="Taxtron">
            <h1>Platform Operations</h1>
            <p style="color: var(--text-muted);">Manage updates for Taxtron AI, Music, and Content platforms.</p>
        </header>

        <div class="card">
            <h2>🚀 Push New Update</h2>
            <form id="updateForm" onsubmit="publishUpdate(event)">
                <div class="form-group">
                    <label>Platform / Category</label>
                    <select id="updateCategory" class="form-control">
                        <option value="AI Engine">Taxtron AI Engine</option>
                        <option value="Education">Education & Research</option>
                        <option value="Music">Taxtron Music</option>
                        <option value="Content">Taxtron Content</option>
                        <option value="System">System Maintenance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Release Notes / Message</label>
                    <textarea id="updateMessage" class="form-control" rows="4" required placeholder="Describe the new feature, tool, or fix..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Publish to Network</button>
            </form>
        </div>

        <div class="card">
            <h2>Active Deployments & Updates</h2>
            <div id="adminUpdateList">Loading database...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
            authDomain: "taxtron-ai.firebaseapp.com",
            projectId: "taxtron-ai",
            appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        function publishUpdate(event) {
            event.preventDefault();
            const category = document.getElementById('updateCategory').value;
            const message = document.getElementById('updateMessage').value;

            db.collection("taxtron_updates").add({
                category: category,
                message: message,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('updateForm').reset();
            }).catch(error => console.error("Error: ", error));
        }

        db.collection("taxtron_updates").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById('adminUpdateList');
            list.innerHTML = '';
            if (snapshot.empty) { list.innerHTML = '<p style="color:var(--text-muted)">No active updates.</p>'; return; }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'update-item';
                div.innerHTML = `
                    <div>
                        <strong style="color:var(--accent); font-size: 0.85rem; text-transform: uppercase;">${data.category}</strong> 
                        <p style="margin-top:5px; font-size:0.95rem;">${data.message}</p>
                    </div>
                    <button class="delete-btn" onclick="deleteUpdate('${doc.id}')">Revoke</button>
                `;
                list.appendChild(div);
            });
        });

        function deleteUpdate(id) {
            if(confirm("Remove this update from the public feed?")) {
                db.collection("taxtron_updates").doc(id).delete();
            }
        }
    </script>
</body>
</html>
