  <style>
html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'DM Sans', sans-serif; box-sizing: border-box; }

/* Custom scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #475569; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse-dot {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-16px); }
  to { opacity: 1; transform: translateX(0); }
}
.msg-animate { animation: fadeUp 0.3s ease-out forwards; }
.slide-in { animation: slideIn 0.2s ease-out forwards; }
.dot-1 { animation: pulse-dot 1.4s infinite 0s; }
.dot-2 { animation: pulse-dot 1.4s infinite 0.2s; }
.dot-3 { animation: pulse-dot 1.4s infinite 0.4s; }

/* Sidebar transition */
.sidebar-wrap {
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.sidebar-hidden { transform: translateX(-100%); opacity: 0; pointer-events: none; }
.sidebar-collapsed {
  width: 80px;
}
.sidebar-collapsed .sidebar-content {
  opacity: 0;
  pointer-events: none;
}
.sidebar-collapsed #collapseIcon {
  transform: rotate(180deg);
}

/* Textarea */
#chatInput {
  resize: none;
  scrollbar-width: none;
}
#chatInput::-webkit-scrollbar { display: none; }

/* Hover lift */
.chat-item:hover { background: #1e293b; }
.chat-item.active { background: #1e293b; border-left: 3px solid #38bdf8; }
</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-base text-textPrimary font-sans">
  <div id="app" class="flex h-full w-full overflow-hidden"><!-- Mobile overlay -->
   <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-30 hidden" onclick="toggleSidebar()"></div><!-- Sidebar -->
   <aside id="sidebar" class="sidebar-wrap fixed md:relative z-40 w-72 h-full bg-surface border-r border-border flex flex-col sidebar-hidden md:transform-none md:opacity-100 md:pointer-events-auto"><!-- Sidebar header -->
    <div class="p-4 border-b border-border flex items-center justify-between">
     <div class="flex items-center gap-2">
      <img src="https://taxtron.in/∫.png" alt="Taxtron" class="w-8 h-8 rounded-lg object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="w-8 h-8 rounded-lg bg-accent/20 flex items-center justify-center hidden"><i data-lucide="bot" class="w-5 h-5 text-accent"></i>
      </div><span id="sidebarTitle" class="font-semibold text-sm text-textPrimary">Taxtron AI</span>
     </div>
     <div class="flex items-center gap-1">
      <button onclick="collapseSidebar()" class="hidden md:flex p-1 rounded-lg hover:bg-card transition-colors" title="Collapse sidebar"> <i data-lucide="chevron-left" id="collapseIcon" class="w-5 h-5 text-muted"></i> </button><button onclick="toggleSidebar()" class="md:hidden p-1 rounded-lg hover:bg-card transition-colors"> <i data-lucide="x" class="w-5 h-5 text-muted"></i> </button>
     </div>
    </div><!-- New chat button -->
    <div class="p-3 sidebar-content transition-opacity duration-300"><button onclick="startNewChat()" class="w-full flex items-center gap-2 px-4 py-2.5 rounded-xl border border-border hover:border-accent/50 hover:bg-card transition-all text-sm text-textSecondary hover:text-textPrimary"> <i data-lucide="plus" class="w-4 h-4"></i> <span>New Chat</span> </button>
    </div><!-- Chat history -->
    <div class="flex-1 overflow-y-auto px-3 pb-3 sidebar-content transition-opacity duration-300">
     <p class="text-xs text-muted uppercase tracking-wider px-2 mb-2">History</p>

     <p id="noHistory" class="text-xs text-muted/60 text-center py-8 hidden">No conversations yet</p>

    <div class="p-4 border-t border-border sidebar-content transition-opacity duration-300">
     <div class="flex items-center gap-2 text-xs text-muted/60"><i data-lucide="shield-check" class="w-3.5 h-3.5"></i> <span>Your data is stored securely</span>
     </div>
    </div>
   </aside><!-- Main area -->
   <main class="flex-1 flex flex-col h-full min-w-0"><!-- Top nav -->
    <header class="shrink-0 h-14 border-b border-border bg-surface/80 backdrop-blur-sm flex items-center justify-between px-4">
     <div class="flex items-center gap-3"><button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-card transition-colors md:hidden"> <i data-lucide="menu" class="w-5 h-5 text-muted"></i> </button>
      <h1 id="navTitle" class="text-sm font-semibold text-textPrimary truncate max-w-[200px] sm:max-w-xs">Taxtron AI</h1>
     </div>
     <div class="flex items-center gap-2"><button onclick="startNewChat()" class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-muted hover:text-textPrimary hover:bg-card transition-all border border-border hover:border-accent/40"> <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Chat </button> <select id="aiSelect" class="px-3 py-1.5 rounded-lg text-xs bg-card border border-border text-textPrimary hover:border-accent/40 transition-all focus:outline-none focus:border-accent"> <option value="gemini">Gemini AI</option> <option value="sarvam">Sarvam AI</option> </select> <button id="userBtn" onclick="toggleUserMenu()" class="w-8 h-8 rounded-full bg-accent/20 flex items-center justify-center hover:bg-accent/30 transition-colors relative"> <i data-lucide="user" class="w-4 h-4 text-accent"></i> </button>
      <div id="userMenu" class="hidden absolute top-12 right-4 bg-card border border-border rounded-lg shadow-lg z-50 min-w-48">
       <div id="userInfo" class="p-3 text-sm text-textPrimary"></div>
      </div>
     </div>
    </header><!-- Messages area -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto">
     <div id="messagesInner" class="max-w-3xl mx-auto px-4 py-6 flex flex-col gap-1"><!-- Welcome screen -->
      <div id="welcomeScreen" class="flex flex-col items-center justify-center py-16 sm:py-24">
       <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-accent/30 to-accent/5 border border-accent/20 flex items-center justify-center mb-6"><i data-lucide="sparkles" class="w-8 h-8 text-accent"></i>
       </div>
       <h2 id="welcomeHeading" class="text-2xl sm:text-3xl font-bold text-textPrimary mb-2 text-center">How can I help you today?</h2>
       <p class="text-sm text-muted mb-8 text-center max-w-md">Ask me anything — from JEE physics to coding problems to creative writing.</p>
       <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full max-w-lg"><button onclick="sendSuggestion(this)" class="suggestion-btn text-left p-4 rounded-xl border border-border hover:border-accent/40 hover:bg-card transition-all group"> <p class="text-sm text-textSecondary group-hover:text-textPrimary">Explain Newton's laws</p><p class="text-xs text-muted/60 mt-1">Physics concept</p></button> <button onclick="sendSuggestion(this)" class="suggestion-btn text-left p-4 rounded-xl border border-border hover:border-accent/40 hover:bg-card transition-all group"> <p class="text-sm text-textSecondary group-hover:text-textPrimary">Write a Python sort function</p><p class="text-xs text-muted/60 mt-1">Coding help</p></button> <button onclick="sendSuggestion(this)" class="suggestion-btn text-left p-4 rounded-xl border border-border hover:border-accent/40 hover:bg-card transition-all group"> <p class="text-sm text-textSecondary group-hover:text-textPrimary">Solve: ∫ x²·eˣ dx</p><p class="text-xs text-muted/60 mt-1">JEE Calculus</p></button> <button onclick="sendSuggestion(this)" class="suggestion-btn text-left p-4 rounded-xl border border-border hover:border-accent/40 hover:bg-card transition-all group"> <p class="text-sm text-textSecondary group-hover:text-textPrimary">Compare React vs Vue</p><p class="text-xs text-muted/60 mt-1">Web development</p></button>
       </div>
      </div>
     </div>
    </div><!-- Input area -->
    <div class="shrink-0 border-t border-border bg-surface/80 backdrop-blur-sm px-4 py-3">
     <div class="max-w-3xl mx-auto">
      <div class="flex items-end gap-2 bg-card border border-border rounded-2xl px-4 py-2 focus-within:border-accent/50 transition-colors"><textarea id="chatInput" rows="1" placeholder="Ask anything about JEE, coding, science..." class="flex-1 bg-transparent text-sm text-textPrimary placeholder-muted/50 outline-none py-2 max-h-32" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea> <button id="sendBtn" onclick="sendMessage()" disabled class="shrink-0 w-9 h-9 rounded-xl bg-accent hover:bg-accentHover disabled:bg-card disabled:text-muted text-base font-bold flex items-center justify-center transition-all disabled:cursor-not-allowed mb-0.5"> <i data-lucide="arrow-up" class="w-4 h-4"></i> </button>
      </div>
      <p class="text-[10px] text-muted/40 text-center mt-2">Taxtron AI may produce inaccurate information. Verify important facts.</p>
     </div>
    </div>
   </main>
  </div>
  <script>
// ── Config defaults ──
const defaultConfig = {
  app_title: 'Taxtron AI',
  welcome_heading: 'How can I help you today?',
  input_placeholder: 'Ask anything about JEE, coding, science...',
  vercel_api_url: 'https://project-0wxuy.vercel.app/api/generate',
  background_color: '#020617',
  surface_color: '#0f172a',
  text_color: '#f1f5f9',
  accent_color: '#38bdf8',
  muted_color: '#94a3b8',
  font_family: 'DM Sans',
  font_size: 14
};

// ── Element SDK ──
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const t = (k) => config[k] || defaultConfig[k];
    document.getElementById('navTitle').textContent = t('app_title');
    document.getElementById('sidebarTitle').textContent = t('app_title');
    document.getElementById('welcomeHeading').textContent = t('welcome_heading');
    document.getElementById('chatInput').placeholder = t('input_placeholder');

    const bg = t('background_color');
    const sf = t('surface_color');
    const tx = t('text_color');
    const ac = t('accent_color');
    const mu = t('muted_color');
    const ff = t('font_family');
    const fs = t('font_size');

    document.body.style.backgroundColor = bg;
    document.body.style.fontFamily = `${ff}, sans-serif`;
    document.body.style.color = tx;
    document.body.style.fontSize = `${fs}px`;

    document.getElementById('sidebar').style.backgroundColor = sf;
    document.querySelectorAll('header')[0].style.backgroundColor = sf + 'cc';
  },
  mapToCapabilities: (config) => {
    const c = (key) => ({
      get: () => config[key] || defaultConfig[key],
      set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
    });
    return {
      recolorables: [c('background_color'), c('surface_color'), c('text_color'), c('accent_color'), c('muted_color')],
      borderables: [],
      fontEditable: c('font_family'),
      fontSizeable: c('font_size')
    };
  },
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['welcome_heading', config.welcome_heading || defaultConfig.welcome_heading],
    ['input_placeholder', config.input_placeholder || defaultConfig.input_placeholder],
    ['vercel_api_url', config.vercel_api_url || defaultConfig.vercel_api_url]
  ])
});

// ── Firebase Setup ──
const firebaseConfig = {
  apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "1:. :web:27c8e67f2107d9a4255fd9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ── State ──
let allMessages = [];
let currentChatId = null;
let chatIndex = {};
let isGenerating = false;
let sidebarOpen = false;
let sidebarCollapsed = false;
let unsubscribe = null;

// ── Init Firebase Auth ──
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    loadChatList(user);
    loadLastChat(user);
    updateUserDisplay(user);
  } else {
    updateUserDisplay(null);
  }
});

function updateUserDisplay(user) {
  const userInfo = document.getElementById('userInfo');
  if (user) {
    userInfo.innerHTML = `
      <div class="flex items-center gap-2 mb-3">
        <img src="${user.photoURL || 'https://i.pravatar.cc/40'}" alt="${user.displayName || user.email}" class="w-8 h-8 rounded-full object-cover">
        <div class="flex-1">
          <p class="text-sm font-medium text-textPrimary">${user.displayName || user.email}</p>
          <p class="text-xs text-muted">${user.email}</p>
        </div>
      </div>
      <button onclick="logout()" class="w-full py-1.5 px-3 rounded-lg bg-red-500/20 hover:bg-red-500/30 text-red-400 text-xs font-medium transition-colors">
        <i data-lucide="log-out" class="w-3 h-3 inline mr-1"></i> Logout
      </button>`;
    lucide.createIcons();
  } else {
    userInfo.innerHTML = `
      <p class="text-xs text-muted mb-2">Not signed in</p>
      <a href="/login.html" target="_blank" class="block py-1.5 px-3 rounded-lg bg-accent/20 hover:bg-accent/30 text-accent text-xs font-medium text-center transition-colors">
        <i data-lucide="log-in" class="w-3 h-3 inline mr-1"></i> Sign In
      </a>`;
    lucide.createIcons();
  }
}

function toggleUserMenu() {
  const menu = document.getElementById('userMenu');
  menu.classList.toggle('hidden');
}

function logout() {
  firebase.auth().signOut().then(() => {
    document.location.reload();
  });
}

// ── Chat Functions ──
function rebuildChatIndex() {
  chatIndex = {};
  allMessages.forEach(m => {
    if (!chatIndex[m.chat_id]) {
      chatIndex[m.chat_id] = { title: 'New Chat', updatedAt: m.timestamp || new Date().toISOString() };
    }
    if (m.role === 'user' && chatIndex[m.chat_id].title === 'New Chat') {
      const snippet = m.content || m.text || '';
      chatIndex[m.chat_id].title = snippet.substring(0, 40) + (snippet.length > 40 ? '…' : '');
    }
    const ts = m.timestamp || new Date().toISOString();
    if (!chatIndex[m.chat_id].updatedAt || ts > chatIndex[m.chat_id].updatedAt) {
      chatIndex[m.chat_id].updatedAt = ts;
    }
  });
}

function renderSidebar() {
  const container = document.getElementById('chatHistory');
  const noHistory = document.getElementById('noHistory');
  const ids = Object.keys(chatIndex).sort((a, b) => chatIndex[b].updatedAt.localeCompare(chatIndex[a].updatedAt));

  if (ids.length === 0) {
    container.innerHTML = '';
    noHistory.classList.remove('hidden');
    return;
  }
  noHistory.classList.add('hidden');

  const existing = new Map([...container.children].map(el => [el.dataset.chatId, el]));

  ids.forEach(id => {
    const info = chatIndex[id];
    if (existing.has(id)) {
      const el = existing.get(id);
      el.querySelector('.chat-title').textContent = info.title;
      el.classList.toggle('active', id === currentChatId);
      existing.delete(id);
    } else {
      const el = document.createElement('button');
      el.dataset.chatId = id;
      el.className = `chat-item slide-in w-full text-left px-3 py-2.5 rounded-lg transition-all flex items-center gap-2 ${id === currentChatId ? 'active' : ''}`;
      el.innerHTML = `<i data-lucide="message-square" class="w-4 h-4 text-muted shrink-0"></i><span class="chat-title text-sm text-textSecondary truncate">${info.title}</span>`;
      el.onclick = () => loadChat(id);
      container.appendChild(el);
      lucide.createIcons();
    }
  });
  existing.forEach(el => el.remove());

  ids.forEach(id => {
    const el = container.querySelector(`[data-chat-id="${id}"]`);
    if (el) container.appendChild(el);
  });
}

function renderChat() {
  const msgs = allMessages.filter(m => m.chat_id === currentChatId).sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  const container = document.getElementById('messagesInner');
  const welcome = document.getElementById('welcomeScreen');

  if (msgs.length === 0) {
    welcome.classList.remove('hidden');
    [...container.children].forEach(c => { if (c !== welcome) c.remove(); });
    return;
  }

  welcome.classList.add('hidden');
  const existingEls = new Map([...container.children].filter(c => c !== welcome && c.dataset.msgId).map(el => [el.dataset.msgId, el]));

  msgs.forEach(m => {
    const mid = m.__backendId || m.id;
    if (existingEls.has(mid)) {
      existingEls.delete(mid);
    } else {
      container.appendChild(createMsgEl(m));
    }
  });
  existingEls.forEach(el => el.remove());
  scrollToBottom();
}

function createMsgEl(m) {
  const div = document.createElement('div');
  div.dataset.msgId = m.__backendId || m.id;
  const isUser = m.role === 'user';
  div.className = 'msg-animate flex ' + (isUser ? 'justify-end' : 'justify-start') + ' mb-3';

  const time = new Date(m.timestamp);
  const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (isUser) {
    div.innerHTML = `
      <div class="max-w-[80%] sm:max-w-[70%]">
        <div class="bg-accent/20 border border-accent/20 text-textPrimary rounded-2xl rounded-br-md px-4 py-3 text-sm leading-relaxed">${escapeHtml(m.content)}</div>
        <p class="text-[10px] text-muted/40 mt-1 text-right">${timeStr}</p>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="max-w-[80%] sm:max-w-[70%] flex gap-3">
        <div class="shrink-0 w-7 h-7 rounded-lg bg-accent/10 flex items-center justify-center mt-1">
          <i data-lucide="bot" class="w-4 h-4 text-accent"></i>
        </div>
        <div>
          <div class="bg-card border border-border text-textSecondary rounded-2xl rounded-tl-md px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(m.content)}</div>
          <p class="text-[10px] text-muted/40 mt-1">${timeStr}</p>
        </div>
      </div>`;
  }
  lucide.createIcons();
  return div;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function startNewChat() {
  currentChatId = generateId();
  const container = document.getElementById('messagesInner');
  [...container.children].forEach(c => { if (c !== document.getElementById('welcomeScreen')) c.remove(); });
  document.getElementById('welcomeScreen').classList.remove('hidden');
  renderSidebar();
  document.getElementById('chatInput').focus();
  if (sidebarOpen) toggleSidebar();
}

function loadChat(id) {
  currentChatId = id;
  renderChat();
  renderSidebar();
  if (sidebarOpen) toggleSidebar();
}

function loadChatList(user) {
  db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .orderBy("created", "desc")
    .onSnapshot(snapshot => {
      chatIndex = {};
      snapshot.forEach(doc => {
        const data = doc.data();
        chatIndex[doc.id] = { 
          title: data.title || 'Chat', 
          updatedAt: new Date(data.created).toISOString() 
        };
      });
      renderSidebar();
    });
}

function loadChats(user) {
  if (!currentChatId) return;

  if (unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(currentChatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {
      allMessages = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        allMessages.push({ 
          ...data, 
          __backendId: doc.id,
          timestamp: data.timestamp || new Date(data.time).toISOString(),
          content: data.content || data.text || '',
          role: data.role || 'user',
          id: doc.id
        });
      });
      renderChat();
    });
}

function loadLastChat(user) {
  db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .orderBy("created", "desc")
    .limit(1)
    .get()
    .then(snapshot => {
      if (!snapshot.empty) {
        const doc = snapshot.docs[0];
        currentChatId = doc.id;
        loadChats(user);
      }
    });
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isGenerating) return;
  
  const user = firebase.auth().currentUser;
  if (!user) {
    toggleUserMenu();
    return;
  }

  if (!currentChatId) {
    currentChatId = generateId();
    saveChatMeta(text);
    loadChatList(user);
  }

  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  document.getElementById('welcomeScreen').classList.add('hidden');

  isGenerating = true;

  addMessage(text, 'user');
  saveMessage('user', text);

  showThinking();

  const aiResponse = await getAIResponse(text);

  removeThinking();

  const botDiv = addMessage(aiResponse, 'bot');
  saveMessage('bot', aiResponse);
  isGenerating = false;
}

async function getAIResponse(query) {
  const config = window.elementSdk?.config || defaultConfig;
  const apiUrl = config.vercel_api_url || defaultConfig.vercel_api_url;
  const aiType = document.getElementById('aiSelect').value;

  try {
    if (aiType === 'gemini') {
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic: query })
      });
      if (res.ok) {
        const data = await res.json();
        return data.result || data.text || 'No response';
      }
    } else if (aiType === 'sarvam') {

function addMessage(text, type) {
  const container = document.getElementById('messagesInner');
  const div = document.createElement('div');
  div.className = 'msg-animate flex ' + (type === 'user' ? 'justify-end' : 'justify-start') + ' mb-3';

  if (type === 'user') {
    div.innerHTML = `
      <div class="max-w-[80%] sm:max-w-[70%]">
        <div class="bg-accent/20 border border-accent/20 text-textPrimary rounded-2xl rounded-br-md px-4 py-3 text-sm leading-relaxed">${escapeHtml(text)}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="max-w-[80%] sm:max-w-[70%] flex gap-3">
        <div class="shrink-0 w-7 h-7 rounded-lg bg-accent/10 flex items-center justify-center mt-1">

        </div>
        <div>
          <div class="bg-card border border-border text-textSecondary rounded-2xl rounded-tl-md px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</div>
        </div>
      </div>`;
  }
  container.appendChild(div);
  lucide.createIcons();
  scrollToBottom();
  return div;
}

function saveMessage(role, text) {
  const user = firebase.auth().currentUser;
  if (!user || !currentChatId) return;

  db.collection('chats')
    .doc(user.uid)
    .collection('sessions')
    .doc(currentChatId)
    .collection('messages')
    .add({
      role: role,
      content: text,
      text: text,
      time: Date.now(),
      timestamp: new Date().toISOString()
    });
}

function saveChatMeta(firstMessage) {
  const user = firebase.auth().currentUser;
  if (!user || !currentChatId) return;

  db.collection('chats')
    .doc(user.uid)
    .collection('sessions')
    .doc(currentChatId)
    .set({
      title: firstMessage.substring(0, 40),
      created: Date.now()
    });
}

function sendSuggestion(btn) {
  const text = btn.querySelector('p').textContent;
  document.getElementById('chatInput').value = text;
  updateSendBtn();
  sendMessage();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  sidebarOpen = !sidebarOpen;
  sb.classList.toggle('sidebar-hidden', !sidebarOpen);
  ov.classList.toggle('hidden', !sidebarOpen);
}

function collapseSidebar() {
  const sb = document.getElementById('sidebar');
  sidebarCollapsed = !sidebarCollapsed;
  sb.classList.toggle('sidebar-collapsed', sidebarCollapsed);
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
  updateSendBtn();
}

function updateSendBtn() {
  document.getElementById('sendBtn').disabled = !document.getElementById('chatInput').value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  const c = document.getElementById('messagesContainer');
  requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

document.getElementById('chatInput').addEventListener('input', updateSendBtn);
document.getElementById('chatInput').focus();
lucide.createIcons();

document.addEventListener('click', (e) => {

    userMenu.classList.add('hidden');

});
