<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxtron AI Pro</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #020617;
  font-family: system-ui;
  overflow: hidden;
}

/* LAYOUT */
#app {
  display: flex;
  height: 100%;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

.chat-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: #94a3b8;
  margin-top: 6px;
}

.chat-item:hover {
  background: #0f172a;
}

.chat-item.active {
  background: #1e293b;
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* MESSAGES */
.message {
  max-width: 750px;
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.user {
  background: #38bdf8;
  color: black;
  margin-left: auto;
}

.bot {
  background: #0f172a;
  color: #e2e8f0;
}

/* INPUT */
.input-box {
  display: flex;
  padding: 12px;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px;
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="app">

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="chatList"></div>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
let currentChatId = null;
let unsubscribe = null;
let sending = false;

const firebaseConfig = {
   apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SEND */
async function send() {
  if (sending) return;

  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  sending = true;

  if (!currentChatId) {
    currentChatId = Date.now().toString();
    await saveChatMeta(text);
    loadChatList();
  }

  addMessage(text, "user");
  saveMessage("user", text);

  input.value = "";

  const botDiv = addMessage("...", "bot");

  try {
    const res = await fetch("https://project-0wxuy.vercel.app/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ topic: text })
    });

    const data = await res.json();
    await streamText(botDiv, data.result || "No response");

    saveMessage("bot", data.result);

  } catch {
    botDiv.innerText = "⚠️ Error";
  }

  sending = false;
}

/* STREAM EFFECT */
async function streamText(el, text) {
  el.innerText = "";
  for (let i = 0; i < text.length; i++) {
    el.innerText += text[i];
    await new Promise(r => setTimeout(r, 8));
  }
}

/* UI */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;

  return div;
}

/* CHAT CONTROL */
function newChat() {
  currentChatId = null;
  document.getElementById("chat").innerHTML = "";
}

/* FIRESTORE */
function saveMessage(role, text) {
  const user = firebase.auth().currentUser;
  if (!user) return;

  db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(currentChatId)
    .collection("messages")
    .add({
      role, text, time: Date.now()
    });
}

function saveChatMeta(firstMessage) {
  const user = firebase.auth().currentUser;
  if (!user) return;

  return db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(currentChatId)
    .set({
      title: firstMessage.substring(0, 25),
      created: Date.now()
    });
}

/* CHAT LIST */
function loadChatList() {
  const user = firebase.auth().currentUser;
  if (!user) return;

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .orderBy("created", "desc")
    .get()
    .then(snap => {
      snap.forEach(doc => {
        const div = document.createElement("div");
        div.className = "chat-item";
        div.innerText = doc.data().title;

        div.onclick = () => openChat(doc.id, div);

        div.ondblclick = () => renameChat(doc.id, div);

        list.appendChild(div);
      });
    });
}

/* OPEN */
function openChat(id, el) {
  currentChatId = id;
  document.getElementById("chat").innerHTML = "";

  document.querySelectorAll(".chat-item").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  const user = firebase.auth().currentUser;

  if (unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(id)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap => {

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      snap.forEach(d => {
        const m = d.data();
        addMessage(m.text, m.role);
      });
    });
}

/* RENAME */
function renameChat(id, el) {
  const name = prompt("Rename chat:");
  if (!name) return;

  const user = firebase.auth().currentUser;

  db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(id)
    .update({ title: name });

  el.innerText = name;
}

/* DELETE */
function deleteChat(id) {
  const user = firebase.auth().currentUser;

  db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(id)
    .delete();

  loadChatList();
}

/* ENTER */
document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

/* AUTH */
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    loadChatList();
  }
});
</script>

</body>
</html>
