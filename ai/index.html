<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxtron AI</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #020617;
  font-family: system-ui;
  overflow: hidden;
}

/* LAYOUT */
#app { display: flex; height: 100%; }

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 12px;
  display: flex;
  flex-direction: column;
  transition: 0.3s;
}

.chat-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: #94a3b8;
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-item:hover { background: #0f172a; }
.chat-item.active { background: #1e293b; color: white; }

.delete-btn {
  font-size: 12px;
  color: #f87171;
  cursor: pointer;
}

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; }

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* MESSAGE */
.message {
  max-width: 750px;
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  line-height: 1.6;
  position: relative;
}

.user {
  background: #38bdf8;
  color: black;
  margin-left: auto;
}

.bot {
  background: #0f172a;
  color: #e2e8f0;
}

/* COPY BTN */
.copy-btn {
  position: absolute;
  right: 8px;
  bottom: 5px;
  font-size: 12px;
  cursor: pointer;
  color: #94a3b8;
}

/* INPUT */
.input-box {
  display: flex;
  padding: 12px;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px;
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width:768px){
  .sidebar {
    position: absolute;
    left: -260px;
    top: 0;
    height: 100%;
    z-index: 999;
  }
  .sidebar.open { left: 0; }
}
</style>
</head>

<body>

<div id="app">

<div class="sidebar">

<!-- LOGO -->
<div style="display:flex;align-items:center;gap:8px;">
  <img src="/logo.png" style="width:28px;">
  <b style="color:white;">Taxtron</b>
</div>

<a href="/" style="color:#38bdf8;margin-top:10px;">🏠 Home</a>
<a href="/profile.html" style="color:#38bdf8;">👤 Profile</a>

<button onclick="newChat()">+ New Chat</button>

<div id="chatList"></div>

</div>

<div class="main">

<button onclick="toggleSidebar()" style="position:absolute;top:10px;left:10px;">☰</button>

<div id="chat" class="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
let currentChatId = null;
let unsubscribe = null;
let sending = false;
let pendingQuery = null;

const firebaseConfig = {
   apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SIDEBAR */
function toggleSidebar() {
  document.querySelector(".sidebar").classList.toggle("open");
}

/* URL QUERY */
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  pendingQuery = params.get("q");
};

/* AUTH */
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    loadChatList();
    loadLastChat(user);

    if (pendingQuery) {
      setTimeout(() => {
        newChat();
        send(pendingQuery);
        pendingQuery = null;
      }, 800);
    }
  }
});

/* SEND */
async function send(prefill=null) {
  if (sending) return;

  const input = document.getElementById("input");
  const text = prefill || input.value.trim();
  if (!text) return;

  sending = true;

  if (!currentChatId) {
    currentChatId = Date.now().toString();
    await saveChatMeta(text);
    loadChatList();
  }

  addMessage(text, "user");
  saveMessage("user", text);
  input.value = "";

  const botDiv = addMessage("", "bot");

  try {
    const res = await fetch("https://project-0wxuy.vercel.app/api/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ topic: text })
    });

    const data = await res.json();
    await streamText(botDiv, data.result || "No response");

    saveMessage("bot", data.result);

  } catch {
    botDiv.innerText = "⚠️ Error";
  }

  sending = false;
}

/* STREAM */
async function streamText(el, text) {
  for (let i=0;i<text.length;i++) {
    el.innerText += text[i];
    await new Promise(r=>setTimeout(r,5));
  }
}

/* MESSAGE */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  const copy = document.createElement("div");
  copy.className = "copy-btn";
  copy.innerText = "Copy";
  copy.onclick = () => navigator.clipboard.writeText(text);

  div.appendChild(copy);

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;

  return div;
}

/* CHAT */
function newChat() {
  currentChatId = null;
  document.getElementById("chat").innerHTML = "";
}

/* FIRESTORE */
function saveMessage(role, text) {
  const user = firebase.auth().currentUser;
  if (!user) return;

  db.collection("chats").doc(user.uid)
    .collection("sessions").doc(currentChatId)
    .collection("messages")
    .add({ role, text, time: Date.now() });
}

function saveChatMeta(text) {
  const user = firebase.auth().currentUser;
  if (!user) return;

  return db.collection("chats").doc(user.uid)
    .collection("sessions").doc(currentChatId)
    .set({ title: text.substring(0,25), created: Date.now() });
}

/* LOAD LIST */
function loadChatList() {
  const user = firebase.auth().currentUser;
  if (!user) return;

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  db.collection("chats").doc(user.uid)
    .collection("sessions")
    .orderBy("created","desc")
    .get()
    .then(snap=>{
      snap.forEach(doc=>{
        const div = document.createElement("div");
        div.className = "chat-item";

        const span = document.createElement("span");
        span.innerText = doc.data().title;
        span.contentEditable = true;

        span.onblur = () => {
          db.collection("chats").doc(user.uid)
            .collection("sessions").doc(doc.id)
            .update({ title: span.innerText });
        };

        const del = document.createElement("span");
        del.innerText = "🗑️";
        del.className = "delete-btn";
        del.onclick = (e) => {
          e.stopPropagation();
          deleteChat(doc.id);
        };

        div.appendChild(span);
        div.appendChild(del);

        div.onclick = () => openChat(doc.id, div);

        list.appendChild(div);
      });
    });
}

/* OPEN */
function openChat(id, el) {
  currentChatId = id;
  document.getElementById("chat").innerHTML = "";

  document.querySelectorAll(".chat-item").forEach(e=>e.classList.remove("active"));
  if (el) el.classList.add("active");

  const user = firebase.auth().currentUser;

  if (unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
    .doc(user.uid)
    .collection("sessions")
    .doc(id)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      snap.forEach(d=>{
        const m = d.data();
        addMessage(m.text, m.role);
      });
    });

  document.querySelector(".sidebar").classList.remove("open");
}

/* DELETE */
function deleteChat(id) {
  const user = firebase.auth().currentUser;

  db.collection("chats").doc(user.uid)
    .collection("sessions").doc(id).delete();

  newChat();
  loadChatList();
}

/* LOAD LAST */
function loadLastChat(user) {
  db.collection("chats").doc(user.uid)
    .collection("sessions")
    .orderBy("created","desc")
    .limit(1)
    .get()
    .then(snap=>{
      if (!snap.empty) {
        openChat(snap.docs[0].id);
      }
    });
}

/* ENTER */
document.getElementById("input").addEventListener("keypress", e=>{
  if (e.key==="Enter") send();
});
</script>

</body>
</html>
