<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxtron AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.start{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button{
  padding:12px 20px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#chatBox{
  display:none;
  padding:20px;
}

.chat{
  max-width:800px;
  margin:auto;
}

.message{
  margin:10px;
  padding:10px;
  border-radius:8px;
}

.user{background:#38bdf8;color:black;text-align:right;}
.bot{background:#1e293b;}

.input-box{
  display:flex;
  margin-top:20px;
}

input{
  flex:1;
  padding:10px;
}
</style>
</head>

<body>

<div class="start">
  <h1>Taxtron AI</h1>
  <button onclick="start()">Start</button>
</div>

<div id="chatBox">
  <div id="chat" class="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

function start(){
  document.querySelector(".start").style.display="none";
  document.getElementById("chatBox").style.display="block";
}

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value;

  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const bot=document.createElement("div");
  bot.className="message bot";
  bot.innerText="Thinking...";
  document.getElementById("chat").appendChild(bot);

  try{
    const res=await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({topic:text})
    });

    const data=await res.json();
    bot.innerText=data.result || "No response";

  }catch(e){
    bot.innerText="Error connecting AI";
  }
}

</script>

</body>
</html>
