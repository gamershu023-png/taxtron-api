<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxtron</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logo{
  font-weight:600;
  font-size:18px;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.nav a{
  color:#94a3b8;
  text-decoration:none;
}

/* USER BUTTON */
.user-btn{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:42px;
}

.search-box{
  margin-top:25px;
  display:flex;
  width:600px;
  max-width:90%;
}

.search-box input{
  flex:1;
  padding:16px;
  border-radius:12px;
  border:none;
}

.search-box button{
  margin-left:10px;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">Taxtron</div>

  <div class="nav-right">
    <a href="#">Home</a>
    <a href="#">About</a>

    <!-- DYNAMIC USER -->
    <div id="userArea"></div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Ask Taxtron AI</h1>

  <div class="search-box">
    <input id="q" placeholder="Ask anything...">
    <button onclick="go()">Ask</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
  authDomain: "taxtron-ai.firebaseapp.com",
  projectId: "taxtron-ai",
  appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
};

firebase.initializeApp(firebaseConfig);

// 🔥 CHECK USER
firebase.auth().onAuthStateChanged(user => {

  const box = document.getElementById("userArea");

  if(user){
    box.innerHTML = `
      <div class="user-btn" onclick="goProfile()">
        👤 ${user.displayName}
      </div>
    `;
  } else {
    box.innerHTML = `
      <div class="user-btn" onclick="goLogin()">
        Sign In
      </div>
    `;
  }

});

// 🔥 NAVIGATION
function go(){
  const q = document.getElementById("q").value;
  if(!q) return;

  window.location.href = "/ai.html?q=" + encodeURIComponent(q);
}

function goLogin(){
  window.location.href = "/login.html";
}

function goProfile(){
  window.location.href = "/profile.html";
}

</script>

</body>
</html>
