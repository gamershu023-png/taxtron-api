<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxtron Explore — Search Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TAXTRON LEARN — Search Dashboard
   Modular, minimalist, responsive. Three vertical zones:
     1) AI Concept Breakdown
     2) Interactive Simulation Lab
     3) Video & Resource Hub
   ============================================================ */

:root {
  /* Professional engineering palette: deep navy + cyan accent */
  --bg:            #0b1220;
  --bg-elevated:   #111a2e;
  --surface:       #16213a;
  --surface-2:     #1c2a48;
  --border:        #243352;
  --border-strong: #324264;
  --text:          #e6edf7;
  --text-muted:    #9aa7c2;
  --text-dim:      #6b7a99;
  --accent:        #38d6c4;   /* cyan-teal */
  --accent-soft:   rgba(56, 214, 196, 0.12);
  --accent-strong: #5ff0dd;
  --warn:          #f5a524;
  --danger:        #f87171;
  --success:       #34d399;
  --radius:        14px;
  --radius-sm:     10px;
  --shadow:        0 10px 30px rgba(0,0,0,0.35);
  --shadow-soft:   0 4px 14px rgba(0,0,0,0.25);
  --maxw:          1180px;
  --font:          'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  --mono:          'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Subtle ambient gradient backdrop */
body::before {
  content: "";
  position: fixed; inset: 0;
  background:
    radial-gradient(800px 500px at 12% -10%, rgba(56,214,196,0.08), transparent 60%),
    radial-gradient(700px 500px at 100% 0%, rgba(56,150,214,0.07), transparent 55%);
  pointer-events: none;
  z-index: -1;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-strong); }

/* ---------- Top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(12px);
  background: rgba(11, 18, 32, 0.72);
  border-bottom: 1px solid var(--border);
}
.topbar-inner {
  max-width: var(--maxw); margin: 0 auto;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 20px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; letter-spacing: 0.2px;
}
.brand-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #2b9d8f);
  display: grid; place-items: center;
  color: #06241f; font-weight: 700; font-size: 14px;
  box-shadow: 0 4px 12px rgba(56,214,196,0.35);
}
.brand-name { font-size: 16px; }
.brand-sub  { color: var(--text-dim); font-size: 12px; font-weight: 400; }

/* ---------- Search ---------- */
.search-form { flex: 1; display: flex; gap: 8px; max-width: 640px; }
.search-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--surface-2);
}
.search-btn {
  background: var(--accent);
  color: #06241f;
  border: none;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-weight: 600; font-size: 14px;
  cursor: pointer;
  transition: transform .12s, box-shadow .15s, background .15s;
}
.search-btn:hover { background: var(--accent-strong); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(56,214,196,0.35); }
.search-btn:active { transform: translateY(0); }
.search-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

.suggest {
  display: flex; gap: 8px; flex-wrap: wrap; padding: 0 20px 12px;
  max-width: var(--maxw); margin: 0 auto;
}
.chip {
  font-size: 12px; color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 999px;
  cursor: pointer; transition: all .15s;
  user-select: none;
}
.chip:hover { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }

/* ---------- Layout ---------- */
main {
  max-width: var(--maxw); margin: 0 auto;
  padding: 28px 20px 80px;
  display: flex; flex-direction: column; gap: 28px;
}

/* ---------- Empty state ---------- */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty h2 { color: var(--text); font-weight: 600; margin-bottom: 8px; }
.empty p { font-size: 14px; max-width: 480px; margin: 0 auto; }

/* ---------- Zone base ---------- */
.zone {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
  overflow: hidden;
  animation: fadeUp .4s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.zone-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
}
.zone-tag {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 4px 8px; border-radius: 6px;
  text-transform: uppercase;
}
.zone-title { font-size: 15px; font-weight: 600; }
.zone-sub { color: var(--text-dim); font-size: 12px; margin-left: auto; }

.zone-body { padding: 20px; }

/* ---------- Zone 1: AI Concept Breakdown ---------- */
.concept-loading {
  display: flex; gap: 8px; align-items: center;
  color: var(--text-muted); font-size: 13px;
}
.concept-loading .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s infinite ease-in-out both;
}
.concept-loading .dot:nth-child(2) { animation-delay: .15s; }
.concept-loading .dot:nth-child(3) { animation-delay: .3s; }
@keyframes pulse { 0%,80%,100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }

.concept-title {
  font-size: 22px; font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.concept-content { color: var(--text); font-size: 14.5px; }
.concept-content p { margin-bottom: 12px; color: var(--text-muted); }
.concept-content h3 { margin: 18px 0 8px; font-size: 15px; color: var(--text); font-weight: 600; }
.concept-content ul { margin: 0 0 12px 18px; color: var(--text-muted); }
.concept-content li { margin-bottom: 6px; }
.concept-content code {
  font-family: var(--mono);
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 6px;
  font-size: 13px; color: var(--accent-strong);
}
.concept-content pre {
  font-family: var(--mono);
  background: #0a1120;
  border: 1px solid var(--border);
  padding: 14px 16px; border-radius: 10px;
  overflow-x: auto; margin: 10px 0 16px;
  font-size: 13px; color: var(--text);
}
.concept-content strong { color: var(--text); }

/* ---------- Zone 2: Simulation Lab ---------- */
.sim-wrap {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
  align-items: stretch;
}
.sim-canvas-wrap {
  position: relative;
  background: #08101f;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  min-height: 360px;
}
.sim-canvas { display: block; width: 100%; height: 100%; }
.sim-overlay {
  position: absolute; top: 12px; left: 12px;
  font-family: var(--mono); font-size: 12px;
  color: var(--text-muted);
  background: rgba(8,16,31,0.7);
  border: 1px solid var(--border);
  padding: 6px 10px; border-radius: 8px;
  pointer-events: none;
}
.sim-overlay b { color: var(--accent); }

.sim-controls {
  display: flex; flex-direction: column; gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px;
}
.sim-controls h4 { font-size: 13px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; }
.control { display: flex; flex-direction: column; gap: 6px; }
.control label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--text-muted);
}
.control label span { color: var(--accent); font-family: var(--mono); }
.control input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  background: var(--border-strong);
  border-radius: 4px; outline: none;
}
.control input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  border: 2px solid #06241f;
  box-shadow: 0 0 0 2px var(--accent-soft);
}
.control input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 2px solid #06241f;
}
.sim-btns { display: flex; gap: 8px; }
.sim-btn {
  flex: 1; padding: 9px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.sim-btn:hover { border-color: var(--accent); color: var(--accent); }
.sim-btn.primary { background: var(--accent); color: #06241f; border-color: var(--accent); }
.sim-btn.primary:hover { background: var(--accent-strong); color: #06241f; }

/* ---------- Zone 3: Video & Resource Hub ---------- */
.hub-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: transform .15s, border-color .15s, box-shadow .2s;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-soft);
}
.card-thumb {
  position: relative; aspect-ratio: 16/9;
  background: linear-gradient(135deg, #1c2a48, #16213a);
  display: grid; place-items: center;
  color: var(--text-dim); font-size: 12px;
}
.card-thumb::after {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(56,214,196,0.08), transparent 60%);
}
.card-thumb .play {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(56,214,196,0.15);
  border: 1px solid var(--accent);
  display: grid; place-items: center;
  color: var(--accent); font-size: 16px;
  z-index: 1;
}
.card-body { padding: 14px 16px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.card-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 10px; }
.card-link {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  font-size: 13px; color: var(--text-muted);
  transition: color .15s, background .15s;
}
.card-link:hover { background: var(--surface-2); color: var(--text); }
.card-link .icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center; font-size: 14px;
  flex-shrink: 0;
}
.card-link .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ---------- Responsive ---------- */
@media (max-width: 860px) {
  .sim-wrap { grid-template-columns: 1fr; }
  .sim-canvas-wrap { min-height: 320px; }
}
@media (max-width: 640px) {
  .topbar-inner { flex-wrap: wrap; gap: 10px; padding: 12px 14px; }
  .search-form { order: 3; flex-basis: 100%; max-width: none; }
  .brand-sub { display: none; }
  main { padding: 20px 14px 60px; gap: 20px; }
  .zone-body { padding: 16px; }
  .concept-title { font-size: 19px; }
  .zone-sub { display: none; }
}
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div>
        <div class="brand-name">Taxtron Explore</div>
        <div class="brand-sub">Engineering & Student Ecosystem</div>
      </div>
    </div>
    <form class="search-form" id="searchForm" onsubmit="return false;">
      <input id="searchInput" class="search-input" type="text" placeholder="Explore a topic — e.g. projectile motion, Ohm's law, Fourier series…" autocomplete="off">
      <button id="searchBtn" class="search-btn" type="submit">Analyze</button>
    </form>
  </div>
  <div class="suggest" id="suggest"></div>
</header>

<!-- ===== MAIN ===== -->
<main id="main">
  <div class="empty" id="emptyState">
    <h2>Explore any concept to unlock its breakdown</h2>
    <p>Type a physics, math, or engineering topic above. Taxtron Explore will generate a concept explanation, an interactive simulation, and curated video resources — all in one dashboard.</p>
  </div>
</main>

<script>
/* ============================================================
   MODULE 1 — App State & Search Controller
   Orchestrates the three zones. Keeps DOM refs and exposes
   a single `runSearch(query)` entry point.
   ============================================================ */
const App = (() => {
  const $input = document.getElementById('searchInput');
  const $btn   = document.getElementById('searchBtn');
  const $main  = document.getElementById('main');
  const $empty = document.getElementById('emptyState');
  const $suggest = document.getElementById('suggest');

  const SUGGESTIONS = [
    'Projectile Motion', 'Ohm\u2019s Law', 'Newton\u2019s Second Law',
    'Simple Harmonic Motion', 'Wave Interference', 'Capacitor Charging',
    'Fourier Series', 'Kinematics'
  ];

  function init() {
    // Render suggestion chips
    SUGGESTIONS.forEach(s => {
      const c = document.createElement('span');
      c.className = 'chip'; c.textContent = s;
      c.onclick = () => { $input.value = s; runSearch(s); };
      $suggest.appendChild(c);
    });

    $btn.addEventListener('click', () => runSearch($input.value));
    $input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); runSearch($input.value); }
    });
  }

  async function runSearch(rawQuery) {
    const query = (rawQuery || '').trim();
    if (!query) return;

    $btn.disabled = true;
    $empty?.remove();

    // Build zones (skeleton first)
    const conceptZone = ConceptZone.create(query);
    const simZone     = SimZone.create(query);
    const hubZone     = HubZone.create(query);
    $main.innerHTML = '';
    $main.append(conceptZone.el, simZone.el, hubZone.el);

    // Kick off AI explanation
    ConceptZone.load(conceptZone, query);

    // Pick + start simulation
    SimZone.start(simZone, query);

    // Populate video/resource hub
    HubZone.load(hubZone, query);

    // Re-enable button (AI loads async)
    setTimeout(() => { $btn.disabled = false; }, 400);
  }

  return { init };
})();

/* ============================================================
   MODULE 2 — Concept Zone (AI Breakdown)
   Calls the existing /api/generate endpoint and renders
   Markdown-formatted output into the top card.
   ============================================================ */
const ConceptZone = (() => {
  function create(query) {
    const el = document.createElement('section');
    el.className = 'zone';
    el.innerHTML = `
      <div class="zone-header">
        <span class="zone-tag">01 · Concept</span>
        <span class="zone-title">AI Concept Breakdown</span>
        <span class="zone-sub">Generated explanation</span>
      </div>
      <div class="zone-body">
        <div class="concept-loading">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span>Analyzing \u201C${escapeHtml(query)}\u201D\u2026</span>
        </div>
      </div>`;
    return { el, body: el.querySelector('.zone-body') };
  }

  async function load(zone, query) {
    const prompt = `You are an expert engineering tutor. Explain the topic "${query}" for a student.
Format strictly as Markdown with these sections:
## Overview
(2-3 sentence concise definition)
## Key Concepts
(bulleted list of 4-6 key points)
## Formulas
(2-4 core formulas using inline code, each with a one-line description)
## Important Notes
(2-3 practical tips/common mistakes)
Keep it concise, direct, and technically accurate. No fluff.`;

    try {
      const res = await fetch('https://project-0wxuy.vercel.app/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic: prompt })
      });
      if (!res.ok) throw new Error('Server responded with status ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      render(zone, query, data.result || 'No response received.');
    } catch (err) {
      zone.body.innerHTML = `
        <div class="concept-title">${escapeHtml(query)}</div>
        <div class="concept-content">
          <p style="color:var(--danger)">Could not load AI explanation: ${escapeHtml(err.message)}.</p>
          <p>Try the simulation and resource hub below in the meantime.</p>
        </div>`;
    }
  }

  function render(zone, query, markdown) {
    zone.body.innerHTML = `
      <div class="concept-title">${escapeHtml(query)}</div>
      <div class="concept-content">${parseMarkdown(markdown)}</div>`;
  }

  /* Minimal, safe Markdown subset: headings, bold, italic, code, lists, paragraphs */
  function parseMarkdown(md) {
    const lines = escapeHtml(md).split(/\r?\n/);
    const out = [];
    let inList = false, inCode = false, codeBuf = [];

    function flushList() { if (inList) { out.push('</ul>'); inList = false; } }

    lines.forEach(line => {
      if (line.trim().startsWith('```')) {
        if (inCode) { out.push('<pre>' + codeBuf.join('\n') + '</pre>'); codeBuf = []; inCode = false; }
        else { flushList(); inCode = true; }
        return;
      }
      if (inCode) { codeBuf.push(line); return; }

      if (/^##\s+/.test(line)) { flushList(); out.push('<h3>' + inline(line.replace(/^##\s+/, '')) + '</h3>'); return; }
      if (/^#\s+/.test(line))  { flushList(); out.push('<h3>' + inline(line.replace(/^#\s+/, '')) + '</h3>'); return; }

      const m = line.match(/^\s*[-*]\s+(.*)/);
      if (m) {
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push('<li>' + inline(m[1]) + '</li>');
        return;
      }

      if (!line.trim()) { flushList(); return; }
      flushList();
      out.push('<p>' + inline(line) + '</p>');
    });
    if (inCode) out.push('<pre>' + codeBuf.join('\n') + '</pre>');
    flushList();
    return out.join('');
  }

  function inline(s) {
    return s
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  return { create, load };
})();

/* ============================================================
   MODULE 3 — Simulation Zone (Interactive Canvas)
   Maps a topic to a simulation factory. Each factory returns
   { mount(canvas), controls, dispose() }. New simulations can
   be registered in `SIM_REGISTRY` without touching the rest.
   ============================================================ */
const SimZone = (() => {
  // Topic keyword -> simulation id
  function pickSim(query) {
    const q = query.toLowerCase();
    if (/projectile|trajectory|ball|throw|launch/.test(q)) return 'projectile';
    if (/ohm|resistance|voltage|circuit/.test(q))         return 'ohm';
    if (/wave|interference|sound|light wave/.test(q))      return 'wave';
    if (/harmonic|oscillation|pendulum|spring/.test(q))    return 'harmonic';
    return 'projectile'; // default fallback
  }

  function create(query) {
    const simId = pickSim(query);
    const el = document.createElement('section');
    el.className = 'zone';
    el.innerHTML = `
      <div class="zone-header">
        <span class="zone-tag">02 · Lab</span>
        <span class="zone-title">Interactive Simulation Lab</span>
        <span class="zone-sub">${escapeHtml(SIM_LABELS[simId] || 'Live simulation')}</span>
      </div>
      <div class="zone-body">
        <div class="sim-wrap">
          <div class="sim-canvas-wrap">
            <canvas id="simCanvas" class="sim-canvas"></canvas>
            <div class="sim-overlay" id="simOverlay"></div>
          </div>
          <div class="sim-controls" id="simControls"></div>
        </div>
      </div>`;
    return { el, simId };
  }

  function start(zone, query) {
    const canvas  = zone.el.querySelector('#simCanvas');
    const overlay = zone.el.querySelector('#simOverlay');
    const controls= zone.el.querySelector('#simControls');
    const factory = SIM_REGISTRY[zone.simId] || SIM_REGISTRY.projectile;
    zone.sim = factory(canvas, overlay, controls);
    zone.sim.mount();
  }

  const SIM_LABELS = {
    projectile: 'Projectile Motion',
    ohm:       'Ohm\u2019s Law Circuit',
    wave:      'Wave Interference',
    harmonic:  'Simple Harmonic Motion'
  };

  return { create, start };
})();

/* ---------- Simulation Registry ----------
   Each factory: (canvas, overlay, controlsEl) => { mount, dispose }
   Self-contained; no shared state between sims.
-------------------------------------------- */

const SIM_REGISTRY = {};

/* --- Projectile Motion --- */
SIM_REGISTRY.projectile = (canvas, overlay, controlsEl) => {
  let raf = null, running = false, t = 0;
  const state = { angle: 45, velocity: 30, g: 9.8 };

  function buildControls() {
    controlsEl.innerHTML = `
      <h4>Parameters</h4>
      <div class="control">
        <label>Angle <span id="vAngle">45\u00B0</span></label>
        <input type="range" id="rAngle" min="5" max="85" step="1" value="45">
      </div>
      <div class="control">
        <label>Initial Velocity <span id="vVel">30 m/s</span></label>
        <input type="range" id="rVel" min="5" max="80" step="1" value="30">
      </div>
      <div class="control">
        <label>Gravity <span id="vG">9.8 m/s\u00B2</span></label>
        <input type="range" id="rG" min="1" max="25" step="0.1" value="9.8">
      </div>
      <div class="sim-btns">
        <button class="sim-btn primary" id="btnPlay">Play</button>
        <button class="sim-btn" id="btnReset">Reset</button>
      </div>`;
    controlsEl.querySelector('#rAngle').oninput = e => { state.angle = +e.target.value; controlsEl.querySelector('#vAngle').textContent = state.angle + '\u00B0'; reset(); };
    controlsEl.querySelector('#rVel').oninput   = e => { state.velocity = +e.target.value; controlsEl.querySelector('#vVel').textContent = state.velocity + ' m/s'; reset(); };
    controlsEl.querySelector('#rG').oninput     = e => { state.g = +e.target.value; controlsEl.querySelector('#vG').textContent = state.g + ' m/s\u00B2'; reset(); };
    controlsEl.querySelector('#btnPlay').onclick = () => running ? pause() : play();
    controlsEl.querySelector('#btnReset').onclick = reset;
  }

  function mount() {
    buildControls();
    resize();
    window.addEventListener('resize', resize);
    reset();
  }
  function dispose() { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width * dpr; canvas.height = r.height * dpr;
    canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
    const ctx = canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    draw();
  }

  function play() {
    if (running) return;
    running = true;
    controlsEl.querySelector('#btnPlay').textContent = 'Pause';
    loop();
  }
  function pause() { running = false; controlsEl.querySelector('#btnPlay').textContent = 'Play'; cancelAnimationFrame(raf); }

  function reset() {
    pause(); t = 0; draw();
  }

  function loop() {
    t += 1/60;
    draw();
    const v = state.velocity, a = state.angle * Math.PI/180, g = state.g;
    const tFlight = (2 * v * Math.sin(a)) / g;
    if (t > tFlight + 0.4) { pause(); return; }
    raf = requestAnimationFrame(loop);
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    const W = canvas.clientWidth, H = canvas.clientHeight;
    ctx.clearRect(0,0,W,H);

    // Ground
    const groundY = H - 30;
    ctx.strokeStyle = '#243352'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();

    // Grid (subtle)
    ctx.strokeStyle = 'rgba(36,51,82,0.4)';
    for (let x=0; x<W; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0; y<H; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Trajectory
    const v = state.velocity, a = state.angle * Math.PI/180, g = state.g;
    const scale = Math.min(W * 0.9 / ((v*v)/g), H * 0.8 / ((v*v * Math.sin(a)*Math.sin(a))/(2*g))) * 0.7;
    const ox = 40, oy = groundY;

    // Predicted path
    ctx.strokeStyle = 'rgba(56,214,196,0.25)'; ctx.lineWidth = 2;
    ctx.beginPath();
    const tFlight = (2 * v * Math.sin(a)) / g;
    for (let tt=0; tt<=tFlight; tt+=tFlight/60) {
      const x = ox + (v * Math.cos(a) * tt) * scale;
      const y = oy - (v * Math.sin(a) * tt - 0.5 * g * tt * tt) * scale;
      if (tt === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();

    // Current ball
    const x = ox + (v * Math.cos(a) * t) * scale;
    const y = oy - (v * Math.sin(a) * t - 0.5 * g * t * t) * scale;
    ctx.fillStyle = '#38d6c4';
    ctx.shadowColor = 'rgba(56,214,196,0.7)'; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Launcher
    ctx.save();
    ctx.translate(ox, oy);
    ctx.rotate(-a);
    ctx.fillStyle = '#324264';
    ctx.fillRect(0, -5, 28, 10);
    ctx.restore();

    // Stats overlay
    const range = ((v*v) * Math.sin(2*a)) / g;
    const maxH  = (v*v * Math.sin(a)*Math.sin(a)) / (2*g);
    overlay.innerHTML = `time <b>${t.toFixed(2)}s</b> &nbsp; range <b>${range.toFixed(1)} m</b> &nbsp; peak <b>${maxH.toFixed(1)} m</b>`;
  }

  return { mount, dispose };
};

/* --- Ohm's Law --- */
SIM_REGISTRY.ohm = (canvas, overlay, controlsEl) => {
  let raf = null, phase = 0;
  const state = { voltage: 12, resistance: 6 };

  function buildControls() {
    controlsEl.innerHTML = `
      <h4>Parameters</h4>
      <div class="control">
        <label>Voltage <span id="vV">12 V</span></label>
        <input type="range" id="rV" min="1" max="24" step="0.5" value="12">
      </div>
      <div class="control">
        <label>Resistance <span id="vR">6 \u03A9</span></label>
        <input type="range" id="rR" min="1" max="20" step="0.5" value="6">
      </div>
      <div class="sim-btns">
        <button class="sim-btn" id="btnReset">Reset</button>
      </div>`;
    controlsEl.querySelector('#rV').oninput = e => { state.voltage = +e.target.value; controlsEl.querySelector('#vV').textContent = state.voltage + ' V'; };
    controlsEl.querySelector('#rR').oninput = e => { state.resistance = +e.target.value; controlsEl.querySelector('#vR').textContent = state.resistance + ' \u03A9'; };
    controlsEl.querySelector('#btnReset').onclick = () => { state.voltage = 12; state.resistance = 6; buildControls(); };
  }

  function mount() {
    buildControls();
    resize();
    window.addEventListener('resize', resize);
    loop();
  }
  function dispose() { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width * dpr; canvas.height = r.height * dpr;
    canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
    const ctx = canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function loop() {
    phase += 0.05;
    draw();
    raf = requestAnimationFrame(loop);
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    const W = canvas.clientWidth, H = canvas.clientHeight;
    ctx.clearRect(0,0,W,H);

    const current = state.voltage / state.resistance;
    const cx = W/2, cy = H/2, R = Math.min(W,H) * 0.32;

    // Battery (left)
    ctx.fillStyle = '#1c2a48'; ctx.strokeStyle = '#38d6c4'; ctx.lineWidth = 2;
    ctx.fillRect(40, cy - 30, 30, 60);
    ctx.strokeRect(40, cy - 30, 30, 60);
    ctx.fillStyle = '#9aa7c2'; ctx.font = '11px JetBrains Mono';
    ctx.fillText(state.voltage + 'V', 38, cy + 50);

    // Resistor (right) — zigzag
    const rx = W - 100, ry = cy;
    ctx.strokeStyle = '#38d6c4'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rx, ry - 30); ctx.lineTo(rx, ry + 30);
    ctx.moveTo(rx, ry - 30); ctx.lineTo(rx + 12, ry - 22);
    ctx.lineTo(rx - 12, ry - 14); ctx.lineTo(rx + 12, ry - 6);
    ctx.lineTo(rx - 12, ry + 2); ctx.lineTo(rx + 12, ry + 10);
    ctx.lineTo(rx - 12, ry + 18); ctx.lineTo(rx, ry + 30);
    ctx.stroke();
    ctx.fillStyle = '#9aa7c2';
    ctx.fillText(state.resistance + '\u03A9', rx - 10, ry + 50);

    // Wires
    ctx.strokeStyle = '#38d6c4'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(70, cy - 30); ctx.lineTo(cx, cy - 30); ctx.lineTo(rx, cy - 30);
    ctx.moveTo(70, cy + 30); ctx.lineTo(cx, cy + 30); ctx.lineTo(rx, cy + 30);
    ctx.stroke();

    // Animated current dots flowing along top wire
    const flowSpeed = Math.min(current * 0.4, 4);
    for (let i=0; i<10; i++) {
      const p = ((phase * flowSpeed + i * 0.1) % 1);
      const x = 70 + p * (rx - 70);
      ctx.fillStyle = 'rgba(56,214,196,0.9)';
      ctx.beginPath(); ctx.arc(x, cy - 30, 3, 0, Math.PI*2); ctx.fill();
    }

    // Center readout
    ctx.fillStyle = '#e6edf7'; ctx.font = '600 22px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('I = ' + current.toFixed(2) + ' A', cx, cy + 6);
    ctx.textAlign = 'start';

    overlay.innerHTML = `V <b>${state.voltage}V</b> &nbsp; R <b>${state.resistance}\u03A9</b> &nbsp; I <b>${current.toFixed(2)}A</b> &nbsp; P <b>${(state.voltage*current).toFixed(1)}W</b>`;
  }

  return { mount, dispose };
};

/* --- Wave Interference --- */
SIM_REGISTRY.wave = (canvas, overlay, controlsEl) => {
  let raf = null;
  const state = { freq: 1.5, amp: 18, sep: 80 };

  function buildControls() {
    controlsEl.innerHTML = `
      <h4>Parameters</h4>
      <div class="control">
        <label>Frequency <span id="vF">1.5 Hz</span></label>
        <input type="range" id="rF" min="0.5" max="4" step="0.1" value="1.5">
      </div>
      <div class="control">
        <label>Amplitude <span id="vA">18 px</span></label>
        <input type="range" id="rA" min="5" max="40" step="1" value="18">
      </div>
      <div class="control">
        <label>Source Separation <span id="vS">80 px</span></label>
        <input type="range" id="rS" min="20" max="160" step="5" value="80">
      </div>
      <div class="sim-btns">
        <button class="sim-btn" id="btnReset">Reset</button>
      </div>`;
    controlsEl.querySelector('#rF').oninput = e => { state.freq = +e.target.value; controlsEl.querySelector('#vF').textContent = state.freq + ' Hz'; };
    controlsEl.querySelector('#rA').oninput = e => { state.amp = +e.target.value; controlsEl.querySelector('#vA').textContent = state.amp + ' px'; };
    controlsEl.querySelector('#rS').oninput = e => { state.sep = +e.target.value; controlsEl.querySelector('#vS').textContent = state.sep + ' px'; };
    controlsEl.querySelector('#btnReset').onclick = () => { state.freq=1.5; state.amp=18; state.sep=80; buildControls(); };
  }

  function mount() {
    buildControls();
    resize();
    window.addEventListener('resize', resize);
    loop();
  }
  function dispose() { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width * dpr; canvas.height = r.height * dpr;
    canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
    const ctx = canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  let t = 0;
  function loop() {
    t += 0.03;
    draw();
    raf = requestAnimationFrame(loop);
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    const W = canvas.clientWidth, H = canvas.clientHeight;
    const img = ctx.createImageData(W, H);
    const s1 = { x: W/2 - state.sep/2, y: H/2 };
    const s2 = { x: W/2 + state.sep/2, y: H/2 };
    const k = state.freq * 0.05;

    for (let y=0; y<H; y++) {
      for (let x=0; x<W; x++) {
        const d1 = Math.hypot(x - s1.x, y - s1.y);
        const d2 = Math.hypot(x - s2.x, y - s2.y);
        const v = Math.sin(k * d1 - t) + Math.sin(k * d2 - t);
        const i = (y * W + x) * 4;
        const c = Math.max(0, Math.min(255, 128 + v * 30));
        img.data[i] = c * 0.2;
        img.data[i+1] = c * 0.85;
        img.data[i+2] = c * 0.9;
        img.data[i+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);

    // Source markers
    ctx.fillStyle = '#38d6c4';
    [s1, s2].forEach(s => {
      ctx.beginPath(); ctx.arc(s.x, s.y, 5, 0, Math.PI*2); ctx.fill();
    });

    overlay.innerHTML = `freq <b>${state.freq} Hz</b> &nbsp; amp <b>${state.amp}px</b> &nbsp; sep <b>${state.sep}px</b>`;
  }

  return { mount, dispose };
};

/* --- Simple Harmonic Motion --- */
SIM_REGISTRY.harmonic = (canvas, overlay, controlsEl) => {
  let raf = null, t = 0;
  const state = { amplitude: 100, k: 20, mass: 1 };

  function buildControls() {
    controlsEl.innerHTML = `
      <h4>Parameters</h4>
      <div class="control">
        <label>Amplitude <span id="vA">100 px</span></label>
        <input type="range" id="rA" min="40" max="180" step="5" value="100">
      </div>
      <div class="control">
        <label>Spring Constant k <span id="vK">20 N/m</span></label>
        <input type="range" id="rK" min="5" max="60" step="1" value="20">
      </div>
      <div class="control">
        <label>Mass <span id="vM">1 kg</span></label>
        <input type="range" id="rM" min="0.5" max="5" step="0.1" value="1">
      </div>
      <div class="sim-btns">
        <button class="sim-btn" id="btnReset">Reset</button>
      </div>`;
    controlsEl.querySelector('#rA').oninput = e => { state.amplitude = +e.target.value; controlsEl.querySelector('#vA').textContent = state.amplitude + ' px'; };
    controlsEl.querySelector('#rK').oninput = e => { state.k = +e.target.value; controlsEl.querySelector('#vK').textContent = state.k + ' N/m'; };
    controlsEl.querySelector('#rM').oninput = e => { state.mass = +e.target.value; controlsEl.querySelector('#vM').textContent = state.mass + ' kg'; };
    controlsEl.querySelector('#btnReset').onclick = () => { state.amplitude=100; state.k=20; state.mass=1; buildControls(); };
  }

  function mount() {
    buildControls();
    resize();
    window.addEventListener('resize', resize);
    loop();
  }
  function dispose() { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = r.width * dpr; canvas.height = r.height * dpr;
    canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
    const ctx = canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function loop() {
    t += 0.03;
    draw();
    raf = requestAnimationFrame(loop);
  }

  function draw() {
    const ctx = canvas.getContext('2d');
    const W = canvas.clientWidth, H = canvas.clientHeight;
    ctx.clearRect(0,0,W,H);

    const omega = Math.sqrt(state.k / state.mass);
    const x = state.amplitude * Math.cos(omega * t);
    const wallX = 60, centerY = H/2;
    const blockX = W/2 + x;
    const blockSize = 40;

    // Wall
    ctx.fillStyle = '#243352';
    ctx.fillRect(wallX - 10, centerY - 60, 10, 120);
    ctx.strokeStyle = '#324264';
    for (let i=0; i<10; i++) {
      ctx.beginPath(); ctx.moveTo(wallX - 10, centerY - 60 + i*12); ctx.lineTo(wallX - 18, centerY - 50 + i*12); ctx.stroke();
    }

    // Spring (zigzag)
    ctx.strokeStyle = '#38d6c4'; ctx.lineWidth = 2;
    ctx.beginPath();
    const coils = 12;
    const segLen = (blockX - blockSize/2 - wallX) / coils;
    ctx.moveTo(wallX, centerY);
    for (let i=0; i<coils; i++) {
      const sx = wallX + i * segLen + segLen/2;
      const sy = centerY + (i % 2 ? 10 : -10);
      ctx.lineTo(sx, sy);
    }
    ctx.lineTo(blockX - blockSize/2, centerY);
    ctx.stroke();

    // Block
    ctx.fillStyle = '#1c2a48'; ctx.strokeStyle = '#38d6c4'; ctx.lineWidth = 2;
    ctx.fillRect(blockX - blockSize/2, centerY - blockSize/2, blockSize, blockSize);
    ctx.strokeRect(blockX - blockSize/2, centerY - blockSize/2, blockSize, blockSize);

    // Equilibrium line
    ctx.strokeStyle = 'rgba(154,167,194,0.3)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(W/2, 20); ctx.lineTo(W/2, H-20); ctx.stroke();
    ctx.setLineDash([]);

    const period = (2 * Math.PI) / omega;
    overlay.innerHTML = `\u03C9 <b>${omega.toFixed(2)} rad/s</b> &nbsp; T <b>${period.toFixed(2)}s</b> &nbsp; x <b>${x.toFixed(0)}px</b>`;
  }

  return { mount, dispose };
};

/* ============================================================
   MODULE 4 — Hub Zone (Video & Resource Grid)
   Generates curated placeholder cards for videos and
   quick-reference notes. Designed to be swapped with real
   YouTube/search API results later.
   ============================================================ */
const HubZone = (() => {
  function create(query) {
    const el = document.createElement('section');
    el.className = 'zone';
    el.innerHTML = `
      <div class="zone-header">
        <span class="zone-tag">03 · Hub</span>
        <span class="zone-title">Video & Resource Hub</span>
        <span class="zone-sub">Curated references</span>
      </div>
      <div class="zone-body">
        <div class="hub-grid" id="hubGrid"></div>
      </div>`;
    return { el, grid: el.querySelector('#hubGrid') };
  }

  function load(zone, query) {
    const videos = [
      { title: `${query} — Full Lecture`, meta: 'YouTube · 24 min', kind: 'video' },
      { title: `Solved Problems: ${query}`, meta: 'YouTube · 18 min', kind: 'video' },
      { title: `Visual Intuition: ${query}`, meta: 'YouTube · 9 min',  kind: 'video' },
      { title: `Quick Notes — ${query}`,     meta: 'PDF · 2 pages',   kind: 'note' },
      { title: `Formula Sheet — ${query}`,  meta: 'Reference',         kind: 'note' },
      { title: `Wikipedia: ${query}`,         meta: 'External',         kind: 'link' }
    ];

    zone.grid.innerHTML = '';
    videos.forEach(v => {
      const card = document.createElement('div');
      card.className = 'card';
      if (v.kind === 'video') {
        card.innerHTML = `
          <div class="card-thumb"><div class="play">\u25B6</div></div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(v.title)}</div>
            <div class="card-meta"><span>${v.meta}</span></div>
          </div>`;
      } else {
        card.innerHTML = `
          <a class="card-link" href="https://www.google.com/search?q=${encodeURIComponent(v.title)}" target="_blank" rel="noopener">
            <div class="icon">${v.kind === 'note' ? '\u2630' : '\u2197'}</div>
            <div>
              <div>${escapeHtml(v.title)}</div>
              <div class="meta">${v.meta}</div>
            </div>
          </a>`;
      }
      zone.grid.appendChild(card);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  return { create, load };
})();
