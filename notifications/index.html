<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Updates | Taxtron Ecosystem</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19; --card-bg: #111827; --text-main: #f3f4f6;
            --text-muted: #9ca3af; --border-radius: 12px;
            
            /* Category Colors */
            --c-ai: #8b5cf6; --c-edu: #3b82f6; 
            --c-music: #ec4899; --c-content: #10b981; --c-sys: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        
        header { padding: 40px 0; border-bottom: 1px solid #1f2937; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: #1f2937; }
        
        .update-card { position: relative; background: var(--card-bg); border: 1px solid #1f2937; border-radius: var(--border-radius); padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .update-card::before { content: ''; position: absolute; left: -35px; top: 25px; width: 12px; height: 12px; border-radius: 50%; background: #374151; border: 2px solid var(--bg-color); }
        
        .tag { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; margin-bottom: 15px; }
        
        /* Dynamic Tag Coloring */
        .cat-ai-engine { background: rgba(139, 92, 246, 0.1); color: var(--c-ai); }
        .cat-education { background: rgba(59, 130, 246, 0.1); color: var(--c-edu); }
        .cat-music { background: rgba(236, 72, 153, 0.1); color: var(--c-music); }
        .cat-content { background: rgba(16, 185, 129, 0.1); color: var(--c-content); }
        .cat-system { background: rgba(245, 158, 11, 0.1); color: var(--c-sys); }

        .update-card p { font-size: 1.05rem; color: #d1d5db; white-space: pre-wrap; line-height: 1.7; }
        .date { font-size: 0.85rem; color: var(--text-muted); margin-top: 20px; display: block; border-top: 1px solid #1f2937; padding-top: 15px; }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>What's New</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Latest releases, AI model updates, and new tools across the Taxtron ecosystem.</p>
        </header>

        <div class="timeline" id="changelogFeed">
            <div class="empty-state">Connecting to Taxtron network...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
            authDomain: "taxtron-ai.firebaseapp.com",
            projectId: "taxtron-ai",
            appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        db.collection("taxtron_updates").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const feed = document.getElementById('changelogFeed');
            feed.innerHTML = ''; 
            
            if (snapshot.empty) {
                feed.innerHTML = '<div class="empty-state">Systems nominal. No recent updates.</div>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Format the timestamp
                let dateString = "Just now";
                if(data.createdAt) {
                    const date = data.createdAt.toDate();
                    dateString = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                }

                // Create a CSS class friendly version of the category
                const cssClass = "cat-" + data.category.toLowerCase().replace(/ & /g, '-').replace(/ /g, '-');

                const div = document.createElement('div');
                div.className = 'update-card';
                div.innerHTML = `
                    <span class="tag ${cssClass}">${data.category}</span>
                    <p>${data.message}</p>
                    <span class="date">${dateString}</span>
                `;
                feed.appendChild(div);
            });
        });
    </script>
</body>
</html>
