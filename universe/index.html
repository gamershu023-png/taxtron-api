<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta property="og:image" content="https://taxtron.in/∫ (1).png">
<title>Taxtron Universe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 30px 20px 10px;
}

.header h1 {
  font-size: 28px;
  margin: 0;
}

.header p {
  color: #94a3b8;
  margin-top: 8px;
}

/* LOGO */
.logo {
  margin: 30px 0;
}

.logo img {
  width: 220px;
  max-width: 80%;
  border-radius: 20px;
}

/* SECTION */
.section {
  margin: 40px 20px;
}

.section h2 {
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  width: 250px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card a {
  text-decoration: none;
  color: #38bdf8;
  word-break: break-word;
}

/* FOOTER */
.footer {
  margin: 40px 0 20px;
  color: #64748b;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>taxtron.in</h1>
  <p>[formerly legendary playz]</p>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="https://taxtron.in/logo1526tx.gif" alt="Taxtron Logo">
</div>

<!-- WEBSITES -->
<div class="section">
  <h2>🌐 Websites</h2>
  <div class="grid">

    <div class="card">
      <a href="https://taxtron.in" target="_blank">taxtron.in</a>
    </div>

    <div class="card">
      <a href="https://content.taxtron.in" target="_blank">content.taxtron.in</a>
    </div>

    <div class="card">
      <a href="https://music.taxtron.in" target="_blank">music.taxtron.in</a>
    </div>

    <div class="card">
      <a href="https://legendaryplayz.weebly.com/" target="_blank">
        legendaryplayz.weebly.com
      </a>
    </div>

  </div>
</div>

<!-- YOUTUBE -->
<div class="section">
  <h2>📺 YouTube Channels</h2>
  <div class="grid">

    <div class="card">
      <a href="https://www.youtube.com/@yogawithraghav588" target="_blank">
        Yoga with Raghav
      </a>
    </div>

    <div class="card">
      <a href="https://www.youtube.com/@LegendaryPlayz_raghav" target="_blank">
        Legendary Playz
      </a>
    </div>

    <div class="card">
      <a href="https://www.youtube.com/@kidscartoonzone5866" target="_blank">
        Kids Cartoon Zone
      </a>
    </div>

    <div class="card">
      <a href="https://www.youtube.com/@FactsAnjane" target="_blank">
        Facts Anjane
      </a>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Taxtron.in
</div>

</body>
</html>
