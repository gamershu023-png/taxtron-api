<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard | Taxtron Living</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 30px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        header h1 { font-size: 1.8rem; }
        
        .complaint-grid { display: flex; flex-direction: column; gap: 15px; }
        
        .complaint-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .details h3 { font-size: 1.2rem; margin-bottom: 5px; display: flex; gap: 10px; align-items: center;}
        .room-badge { background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; color: #60a5fa;}
        .meta { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .status-resolved { background: rgba(16, 185, 129, 0.2); color: #34d399; }

        .action-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.9; }
        .delete-btn { background: var(--danger); }

        @media(max-width: 768px) {
            .complaint-card { flex-direction: column; align-items: flex-start; }
            .actions { width: 100%; text-align: right; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Taxtron Living Portal</h1>
                <p style="color: var(--text-muted);">Active Tenant Complaints & Requests</p>
            </div>
            <img src="https://taxtron.in/logo1526tx.gif" alt="Logo" style="max-width: 120px;">
        </header>

        <div id="complaints-list" class="complaint-grid">
            <p style="color: var(--text-muted);">Loading live complaints database...</p>
        </div>
    </div>

    <script>
        // Paste your exact Firebase config here to connect the databases
        const firebaseConfig = {
    apiKey: "AIzaSyAi0b3zJoFQBt_9izjsbJTLvQh3ZQoOpuI",
    authDomain: "taxtron-ai.firebaseapp.com",
    projectId: "taxtron-ai",
    appId: "1:1009675616284:web:27c8e67f2107d9a4255fd9"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // Stream complaints in real-time from the database
        db.collection("tenant_complaints")
          .orderBy("createdAt", "desc")
          .onSnapshot((snapshot) => {
              const listContainer = document.getElementById('complaints-list');
              listContainer.innerHTML = ""; // Clear loader/old items

              if (snapshot.empty) {
                  listContainer.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted);">🎉 No outstanding complaints! Everything looks good.</div>`;
                  return;
              }

              snapshot.forEach((doc) => {
                  const data = doc.data();
                  const id = doc.id;
                  const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleString() : "Just now";
                  
                  const isPending = data.status === "Pending";

                  listContainer.innerHTML += `
                      <div class="complaint-card" id="card-${id}">
                          <div class="details">
                              <h3>${data.tenantName} <span class="room-badge">Room ${data.roomNumber}</span></h3>
                              <p style="color: var(--text-muted); font-size: 0.9rem; margin: 4px 0;"><strong>[${data.issueCategory}]</strong></p>
                              <p style="margin-top: 8px;">${data.description}</p>
                              <div class="meta">Filed: ${dateStr} | Status: 
                                  <span class="status-badge ${isPending ? 'status-pending' : 'status-resolved'}">${data.status}</span>
                              </div>
                          </div>
                          <div class="actions">
                              ${isPending ? 
                                  `<button class="action-btn" onclick="resolveIssue('${id}')">Mark Resolved</button>` : 
                                  `<button class="action-btn delete-btn" onclick="deleteIssue('${id}')">Archive/Delete</button>`
                              }
                          </div>
                      </div>
                  `;
              });
          });

        // Function to change status from Pending to Resolved
        function resolveIssue(docId) {
            db.collection("tenant_complaints").doc(docId).update({
                status: "Resolved"
            })
            .then(() => console.log("Issue resolved successfully."))
            .catch(err => alert("Error updating status: " + err.message));
        }

        // Function to permanently clear a fixed complaint out of your view
        function deleteIssue(docId) {
            if(confirm("Are you sure you want to delete this log permanently?")) {
                db.collection("tenant_complaints").doc(docId).delete()
                .then(() => console.log("Issue deleted."))
                .catch(err => alert("Error deleting issue: " + err.message));
            }
        }
    </script>
</body>
</html>
